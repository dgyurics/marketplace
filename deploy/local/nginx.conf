# Rate limiting
limit_req_zone $binary_remote_addr zone=users:10m       rate=1000r/m;
limit_req_zone $binary_remote_addr zone=orders:10m      rate=1000r/m;
limit_req_zone $binary_remote_addr zone=webhooks:10m    rate=1000r/m;
limit_req_zone $binary_remote_addr zone=api_general:10m rate=1000r/m;
limit_req_zone $binary_remote_addr zone=images:10m      rate=1000r/m;
limit_req_zone $binary_remote_addr zone=frontend:10m    rate=1000r/m;
limit_req_status 429;

server {
   listen 80;
   server_name marketplace;

   # Security headers
   add_header X-Content-Type-Options  "nosniff" always;
   add_header X-Frame-Options         "SAMEORIGIN" always;
   add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

   # Gzip
   gzip            on;
   gzip_vary       on;
   gzip_min_length 1024;
   gzip_comp_level 6;
   gzip_types      application/json text/plain;

   # API: users
   location ~ ^/api/users(/.*)?$ {
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;

      proxy_pass                         http://host.docker.internal:8000/users$1;
      limit_req                          zone=users burst=10 nodelay;
   }

   # API: orders
   location ~ ^/api/orders(/.*)?$ {
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;

      proxy_pass                         http://host.docker.internal:8000/orders$1;
      limit_req                          zone=orders burst=5 nodelay;
   }

   # API: stripe webhooks
   location /api/payment/events {
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;

      proxy_pass                         http://host.docker.internal:8000/payment/events;
      limit_req                          zone=webhooks burst=100 nodelay;
   }

   # API: image uploads (larger body)
   location /api/images/products/ {
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header Upgrade           $http_upgrade;
      proxy_set_header Connection        "upgrade";

      proxy_pass                         http://host.docker.internal:8000/images/products/;
      client_max_body_size               30M;
   }

   # API: catch-all
   location /api/ {
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;

      proxy_pass                         http://host.docker.internal:8000/;
      limit_req                          zone=api_general burst=20 nodelay;
   }

   # Image proxy (imgproxy)
   location /images/ {
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;

      proxy_pass                         http://imgproxy/;
      limit_req                          zone=images burst=100 nodelay;
   }

   # Frontend (Vite dev server)
   location / {
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header Upgrade           $http_upgrade;
      proxy_set_header Connection        "upgrade";

      proxy_pass                         http://host.docker.internal:5173/;
      limit_req                          zone=frontend burst=1000 nodelay;
   }
}