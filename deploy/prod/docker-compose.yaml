name: marketplace

services:
  nginx:
    container_name: nginx
    build:
      context: ../../
      dockerfile: deploy/prod/Dockerfile.nginx
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: 5
        compress: "true"
    env_file:
      - .env
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.50"
        reservations:
          memory: 32m
          cpus: "0.10"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ssl-certs:/etc/letsencrypt:ro
    depends_on:
      - api
      - web

  api:
    container_name: api
    build:
      context: ../../
      dockerfile: deploy/prod/Dockerfile.api
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: 5
        compress: "true"
    env_file:
      - .env
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.00"
        reservations:
          memory: 128m
          cpus: "0.25"
    volumes:
      - images-data:/images:rw
    depends_on:
      - postgres
      - imgproxy
      - rembg

  web:
    container_name: web
    build:
      context: ../../
      dockerfile: deploy/prod/Dockerfile.web
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: 5
        compress: "true"
    env_file:
      - .env
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.50"
        reservations:
          memory: 32m
          cpus: "0.10"
    depends_on:
      - api
  
  postgres:
    container_name: postgres
    build:
      context: ../../
      dockerfile: deploy/prod/Dockerfile.postgres
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: 5
        compress: "true"
    env_file:
      - .env
    deploy:
      resources:
        limits:
          memory: 1024m
          cpus: "1.00"
        reservations:
          memory: 256m
          cpus: "0.50"
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    # PostgreSQL Docker image uses a custom/special entrypoint script.
    # To avoid overriding it, run command from here rather than CMD within the Dockerfile.
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    

  imgproxy:
    container_name: imgproxy
    build:
      context: ../../
      dockerfile: deploy/prod/Dockerfile.imgproxy
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: 5
        compress: "true"
    env_file:
      - .env
    volumes:
      - images-data:/images:ro
    deploy:
      resources:
        limits:
          memory: 1536m
          cpus: "1.00"
        reservations:
          memory: 384m
          cpus: "0.25"

  rembg:
    container_name: rembg
    build:
      context: ../../
      dockerfile: deploy/prod/Dockerfile.rembg
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: 5
        compress: "true"
    env_file:
      - .env
    deploy:
      resources:
        limits:
          memory: 2048m
          cpus: "1.50"
        reservations:
          memory: 1024m
          cpus: "0.50"

volumes:
  postgres-data:
  images-data:
  ssl-certs:
